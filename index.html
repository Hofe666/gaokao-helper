<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>广东志愿填报助手</title>
</head>
<body>
<h1>🎓 广东志愿填报助手</h1>

<input id="score" placeholder="输入分数">
<select id="subject">
  <option value="物理">物理</option>
  <option value="历史">历史</option>
</select>
<button onclick="generate()">开始推荐</button>

<pre id="result"></pre>

<script>
async function generate() {
  const score = document.getElementById("score").value;
  const subject = document.getElementById("subject").value;

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ score, subject })
    });

    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);

    const data = await res.json();

    let html = "冲刺院校:\n";
    data.chong.forEach(s => html += `- ${s.name} (推荐专业: ${s.recommended_major.join(", ")})\n`);

    html += "\n稳妥院校:\n";
    data.wen.forEach(s => html += `- ${s.name} (推荐专业: ${s.recommended_major.join(", ")})\n`);

    html += "\n保底院校:\n";
    data.bao.forEach(s => html += `- ${s.name} (推荐专业: ${s.recommended_major.join(", ")})\n`);

    document.getElementById("result").innerText = html;

  } catch (err) {
    console.error(err);
    document.getElementById("result").innerText = "请求失败，请检查 API 或数据路径。";
  }
}
</script>
</body>
</html>
